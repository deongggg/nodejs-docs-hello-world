# Multi-stage pipeline: Build then deploy to Staging with approval
trigger:
  - main

variables:
  # Paste your service connection ID from the old YAML
  azureSubscription: 'ac6967ed-2153-49a6-8fbb-01286db81b61'
  # Your production app name from Step 3
  webAppName: 'deong-nodeapp'
  # Your new staging app name
  stagingAppName: 'deong-nodeapp-staging'

stages:
  # Stage 1: Build and test the application
  - stage: Build
    displayName: 'Build Stage'
    jobs:
      - job: BuildJob
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          # Install Node.js on the build agent
          - task: UseNode@1
            inputs:
              version: '22.x'
            displayName: 'Install Node.js'

          # Install dependencies, build, and test
          - script: |
              npm install
              npm run build --if-present
              npm run test --if-present
            displayName: 'npm install, build, and test'

          # Package the app into a ZIP file
          - task: ArchiveFiles@2
            displayName: 'Archive files'
            inputs:
              rootFolderOrFile: '$(System.DefaultWorkingDirectory)'
              includeRootFolder: false
              archiveType: zip
              archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
              replaceExistingArchive: true

          # Publish the ZIP as a pipeline artifact
          - upload: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
            artifact: drop

  # Stage 2: Deploy to the staging environment (requires approval)
  - stage: Staging
    displayName: 'Deploy to Staging'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: DeployToStaging
        pool:
          vmImage: 'ubuntu-latest'
        # Targets the "staging" environment with the approval gate  
        environment: 'staging'
        strategy:
          runOnce:
            deploy:
              steps:
                # Deploy the artifact to the staging App Service
                - task: AzureWebApp@1
                  displayName: 'Deploy to Staging App Service'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    appType: 'webAppLinux'
                    appName: '$(stagingAppName)'
                    package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
